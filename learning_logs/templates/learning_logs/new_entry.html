{% extends 'learning_logs/base.html' %}
{% load bootstrap3 %}

{% block header %}
<h2>
    <a href="{% url 'topic' topic.id %}">{{ topic }}</a>
</h2>
{% endblock header %}

{% block content %}

<h3>Adicione uma nova entrada:</h3>

<form action="{% url 'new_entry' topic.id %}" method="post" class="form">
    {% csrf_token %}
    {% bootstrap_form form %}
    {% buttons %}
        <button class="btn btn-primary" name="submit">Adicionar</button>
    {% endbuttons %}
</form>
{% endblock content %}
