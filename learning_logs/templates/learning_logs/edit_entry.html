{% extends 'learning_logs/base.html' %}
{% load bootstrap3 %}

{% block header %}
<h2>
    <a href="{% url 'topic' topic.id %}">{{ topic }}</a>
</h2>
{% endblock header %}

{% block content %}

<h3>Editar anotação:</h3>

<form action="{% url 'edit_entry' entry.id %}" method="post" class="form">
    <div>
        {% csrf_token %}
        {% bootstrap_form form %}
        {% buttons %}
        <button class="btn btn-primary" name="submit">Salvar</button>
        {% endbuttons %}
    </div>
</form>
{% endblock content %}
